name: Weekly Publish

on:
  schedule:
    # Runs every Thursday at 6:00 AM IST (00:30 UTC)
    - cron: '30 0 * * 4'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
